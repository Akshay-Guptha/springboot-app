apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: springboot-app

  template:
    metadata:
      labels:
        app: springboot-app

    spec:
      containers:
      - name: springboot-app
        image: akshayguptha25/springboot-app:latest
        ports:
        - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service

spec:
  type: NodePort

  selector:
    app: springboot-app

  ports:
  - port: 80
    targetPort: 8081
    nodePort: 30008